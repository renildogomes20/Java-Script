<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>input</title>
</head>
<body>
    Digite qualquer coisa<input type="text" name="txt" id="txt">
    <div id="res"></div>
    <script>
        const objet = document.getElementById("txt")
        const res = document.getElementById("res")

        objet.addEventListener("input",(event)=>{
            res.innerHTML="Você digitou: " + event.target.value
        })
    </script>
</body>
</html>
